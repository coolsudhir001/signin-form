<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Sign-In Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="form-wrapper">
            <h1>Student Sign-In</h1>
            <p class="subtitle">Please fill in your details to sign in</p>
            
            <form id="signinForm">
                <div class="form-group">
                    <label for="firstName">First Name *</label>
                    <input 
                        type="text" 
                        id="firstName" 
                        name="firstName" 
                        placeholder="Enter your first name"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="lastName">Last Name *</label>
                    <input 
                        type="text" 
                        id="lastName" 
                        name="lastName" 
                        placeholder="Enter your last name"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="Enter your email"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="studentId">Student ID *</label>
                    <input 
                        type="text" 
                        id="studentId" 
                        name="studentId" 
                        placeholder="Enter your student ID"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="course">Course/Class *</label>
                    <input 
                        type="text" 
                        id="course" 
                        name="course" 
                        placeholder="Enter your course or class"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="signInTime">Sign-In Time *</label>
                    <input 
                        type="time" 
                        id="signInTime" 
                        name="signInTime"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="date">Date *</label>
                    <input 
                        type="date" 
                        id="date" 
                        name="date"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="remarks">Remarks (Optional)</label>
                    <textarea 
                        id="remarks" 
                        name="remarks" 
                        placeholder="Any additional remarks"
                        rows="3"
                    ></textarea>
                </div>

                <button type="submit" class="btn-submit">Sign In</button>
            </form>

            <div id="message" class="message"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
